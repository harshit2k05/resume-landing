<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-wrapper">
        <header>
            <nav>
                <h1 class="logo">ResumeFlow</h1>
            </nav>
        </header>
        <main>
            <section class="register">
                <h2>Welcome Back</h2>
                <p>Enter your email and password to access your account.</p>
                <section class="form-section">
                    <form action="#">

                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="sellostore@company.com" required>

                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="********" required>

                        <button type="submit">Register</button>

                    </form>
                    <p>Don't Have An Account ? <a href="../index.html">Register</a></p>
                </section>
            </section>
            <section class="image">
                <img src="login.jpg" alt="Login/Signup Image">
            </section>
        </main>
        <footer></footer>
    </div>
</body>

</html>
